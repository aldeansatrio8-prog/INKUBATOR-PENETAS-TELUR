<!DOCTYPE html>
<html>
<head>
    <title>Inkubator Monitoring</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; }
        .card { background: #1e293b; padding: 20px; border-radius: 15px; margin: 10px; display: inline-block; min-width: 200px; }
        .val { font-size: 3rem; font-weight: bold; color: #38bdf8; }
        .btn { background: #22c55e; color: white; padding: 15px; text-decoration: none; border-radius: 10px; display: inline-block; margin-top: 20px; }
        #chart-container { width: 80%; margin: auto; background: #1e293b; padding: 20px; border-radius: 15px; }
    </style>
</head>
<body>
    <h1>INKUBATOR REAL-TIME</h1>
    
    <div class="card">
        <div>Suhu</div>
        <div id="temp" class="val">--</div><div>°C</div>
    </div>
    
    <div class="card">
        <div>Kelembapan</div>
        <div id="humi" class="val" style="color: #fbbf24;">--</div><div>%</div>
    </div>

    <div id="chart-container"><canvas id="myChart"></canvas></div>

    <a id="download" href="#" class="btn">📥 DOWNLOAD EXCEL</a>

    <script>
        const config = { databaseURL: "https://penetas-telur-21ecc-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(config);
        const db = firebase.database();

        // Download Excel Logic
        const sID = "1vRl2kPMxGhIdPFxaPBzKgwgOIXrkVuTA2bmJ2Vr7WDOTdQvU2jfmVxXkP3x3KaOIsg1ySC652J0AuR_";
        document.getElementById('download').href = `https://docs.google.com/spreadsheets/d/${sID}/export?format=xlsx`;

        // Chart Setup
        const ctx = document.getElementById('myChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Suhu', data: [], borderColor: '#38bdf8', fill: true }] }
        });

        // Listen Firebase
        db.ref("Inkubator/suhu").on("value", snap => {
            const v = snap.val();
            document.getElementById('temp').innerText = v;
            const now = new Date().toLocaleTimeString();
            chart.data.labels.push(now);
            chart.data.datasets[0].data.push(v);
            if(chart.data.labels.length > 10) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
            chart.update();
        });

        db.ref("Inkubator/kelembapan").on("value", snap => {
            document.getElementById('humi').innerText = snap.val();
        });
    </script>
</body>
</html>
