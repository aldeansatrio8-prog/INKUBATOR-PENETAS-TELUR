<div class="card cahaya" id="card-cahaya" style="transition: all 0.3s;">
    <div class="label">Penerangan</div>
    <div class="main-val" id="ldr-text" style="color: #64748b; font-size: 3rem;">GELAP</div>
    <div class="desc">Status Lampu</div>
</div>

<style>
    /* Tambahkan garis samping warna putih untuk kartu cahaya */
    .card.cahaya::before { background: #fff; }
    
    /* Efek menyala kalau Terang */
    .card.bright {
        background: rgba(251, 191, 36, 0.2); /* Warna accent transparan */
        box-shadow: 0 0 20px rgba(251, 191, 36, 0.4);
    }
</style>

<script>
    // ... kode listener suhu & humi ...

    // Listener Cahaya
    db.ref("Inkubator/statusCahaya").on("value", (snap) => {
        const status = snap.val();
        if(status) {
            const ldrText = document.getElementById('ldr-text');
            const ldrCard = document.getElementById('card-cahaya');
            
            ldrText.innerText = status;

            // Beri efek visual
            if(status === "TERANG") {
                ldrText.style.color = "#fbbf24"; // Warna Accent
                ldrCard.classList.add('bright');
            } else {
                ldrText.style.color = "#64748b"; // Warna Slate (redup)
                ldrCard.classList.remove('bright');
            }
        }
    });
</script>
