<!DOCTYPE html>
<html>
<head>
    <title>Inkubator Pro v4.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <style>
        body { background: #050a0e; color: #00f2ff; font-family: sans-serif; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: #0d1821; border: 1px solid #00f2ff; padding: 20px; border-radius: 10px; }
        .value { font-size: 2.5em; font-weight: bold; }
        #chart-wrap { background: #0d1821; margin: 20px; padding: 20px; border-radius: 10px; height: 300px; }
        button { background: none; border: 1px solid red; color: red; padding: 10px; cursor: pointer; border-radius: 5px; }
        button:hover { background: red; color: white; }
    </style>
</head>
<body>
    <h1>INCUBATOR MONITORING</h1>
    <p id="last-update">Menghubungkan...</p>

    <div class="grid">
        <div class="card"><h3>SUHU</h3><div class="value" id="t">0</div></div>
        <div class="card"><h3>HUMI</h3><div class="value" id="h">0</div></div>
        <div class="card"><h3>HARI</h3><div class="value" id="day">0</div></div>
    </div>

    <div id="chart-wrap"><canvas id="grafikSuhu"></canvas></div>

    <button onclick="hapusHistory()">HAPUS SEMUA RIWAYAT DATA</button>

<script>
const firebaseConfig = { databaseURL: "https://penetas-telur-21ecc-default-rtdb.asia-southeast1.firebasedatabase.app" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Setup Grafik
const ctx = document.getElementById('grafikSuhu').getContext('2d');
let myChart = new Chart(ctx, {
    type: 'line',
    data: { labels: [], datasets: [{ label: 'Suhu (°C)', data: [], borderColor: '#00f2ff', tension: 0.3 }] },
    options: { maintainAspectRatio: false, scales: { y: { min: 35, max: 40 } } }
});

// 1. AMBIL DATA LAMA (BIAR GA NGULANG DARI NOL)
db.ref('inkubator/log_history').limitToLast(20).once('value', (snap) => {
    snap.forEach((child) => {
        const d = child.val();
        myChart.data.labels.push(d.w.split(' ')[1]); 
        myChart.data.datasets[0].data.push(d.t);
    });
    myChart.update();
});

// 2. BACA DATA REALTIME
db.ref('inkubator/realtime').on('value', (snap) => {
    const d = snap.val();
    if(d) {
        document.getElementById('t').innerText = d.suhu.toFixed(1);
        document.getElementById('h').innerText = d.kelembapan.toFixed(0);
        document.getElementById('day').innerText = d.hari_ke;
        document.getElementById('last-update').innerText = "Terakhir: " + d.waktu_update;
        
        // Tambah ke grafik jika data baru masuk
        if(myChart.data.labels.length > 25) { myChart.data.labels.shift(); myChart.data.datasets[0].data.shift(); }
        myChart.data.labels.push(d.waktu_update.split(' ')[1]);
        myChart.data.datasets[0].data.push(d.suhu);
        myChart.update();
    }
});

function hapusHistory() {
    if(confirm("Hapus history di web? (Data di SD Card tetap aman)")) {
        db.ref('inkubator/log_history').remove();
        location.reload();
    }
}
</script>
</body>
</html>
