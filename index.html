<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Monitoring Inkubator Pintar</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; }
        .box { background: white; padding: 20px; margin: 20px auto; width: 80%; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .suhu { font-size: 48px; color: #e67e22; font-weight: bold; }
    </style>
</head>
<body>

    <div class="box">
        <h1>Monitoring Real-time (Firebase)</h1>
        <div id="status-koneksi">Menghubungkan...</div>
        <div class="suhu"><span id="temp">--</span>°C</div>
        <p>Kelembapan: <span id="humi">--</span>%</p>
    </div>

    <div class="box">
        <h1>Riwayat Data & Grafik (Google Sheets)</h1>
        <iframe src="<iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vRl2kPMxGhIdPFxaPBzKgwgOIXrkVuTA2bmJ2Vr7WDOTdQvU2jfmVxXkP3x3KaOIsg1ySC652J0AuR_/pubhtml?widget=true&amp;headers=false"></iframe>" width="100%" height="500"></iframe>
    </div>

    <script>
        // MASUKKAN KONFIGURASI FIREBASE KAMU DI SINI
        const firebaseConfig = {
            databaseURL: "https://penetas-telur-21ecc-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Ambil data Suhu
        db.ref("Inkubator/suhu").on("value", (snapshot) => {
            document.getElementById("temp").innerText = snapshot.val();
            document.getElementById("status-koneksi").innerText = "Tersambung ke Sensor";
        });

        // Ambil data Kelembapan
        db.ref("Inkubator/kelembapan").on("value", (snapshot) => {
            document.getElementById("humi").innerText = snapshot.val();
        });
    </script>
</body>
</html>
