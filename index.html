<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Commander V5.0 - Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', sans-serif; }
        .card { background: #1e293b; border: none; border-radius: 15px; transition: 0.3s; color: white; }
        .status-dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; }
        .bg-temp { background: linear-gradient(45deg, #f59e0b, #ef4444); }
        .bg-humi { background: linear-gradient(45deg, #0ea5e9, #2563eb); }
        .bg-light { background: linear-gradient(45deg, #10b981, #059669); }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Nexus Commander V5.0 <span id="conn" class="status-dot bg-danger"></span></h2>
            <button onclick="downloadExcel()" class="btn btn-success">Download Data Log (.xlsx)</button>
        </div>

        <div class="row g-4 mb-4 text-center">
            <div class="col-md-4"><div class="card p-4 bg-temp"><h3>Suhu</h3><h1 id="txtTemp">--</h1></div></div>
            <div class="col-md-4"><div class="card p-4 bg-humi"><h3>Kelembapan</h3><h1 id="txtHumi">--</h1></div></div>
            <div class="col-md-4"><div class="card p-4 bg-light"><h3>Cahaya</h3><h1 id="txtLDR">--</h1></div></div>
        </div>

        <div class="card p-4">
            <canvas id="liveChart" style="max-height: 300px;"></canvas>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCDz2IvAAzkPbUmY1APGBS1GRpVIOpv5g8",
            authDomain: "penetas-telur-553a3.firebaseapp.com",
            databaseURL: "https://penetas-telur-553a3-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "penetas-telur-553a3",
            appId: "1:50887200926:web:a134dec8ee163057532b8f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Grafik Setup
        const ctx = document.getElementById('liveChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [
                { label: 'Suhu (°C)', borderColor: '#ef4444', data: [], tension: 0.4 },
                { label: 'Humi (%)', borderColor: '#3b82f6', data: [], tension: 0.4 }
            ]},
            options: { responsive: true, scales: { x: { display: false } } }
        });

        // Update Real-time
        db.ref('/inkubator/live').on('value', snap => {
            const data = snap.val();
            document.getElementById('txtTemp').innerText = data.suhu + "°C";
            document.getElementById('txtHumi').innerText = data.humi + "%";
            document.getElementById('txtLDR').innerText = data.ldr;
            document.getElementById('conn').className = "status-dot bg-success";

            // Update Chart
            const now = new Date().toLocaleTimeString();
            chart.data.labels.push(now);
            chart.data.datasets[0].data.push(data.suhu);
            chart.data.datasets[1].data.push(data.humi);
            if(chart.data.labels.length > 20) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); chart.data.datasets[1].data.shift(); }
            chart.update();
        });

        // Download Excel
        async function downloadExcel() {
            const snap = await db.ref('/inkubator/history').once('value');
            const logs = snap.val();
            const dataForExcel = [];
            let i = 1;

            for (let key in logs) {
                dataForExcel.push({
                    No: i++,
                    Waktu: logs[key].time,
                    Suhu: logs[key].temp,
                    Kelembapan: logs[key].humi
                });
            }

            const worksheet = XLSX.utils.json_to_sheet(dataForExcel);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Log History");
            XLSX.writeFile(workbook, "Nexus_Commander_Log.xlsx");
        }
    </script>
</body>
</html>
