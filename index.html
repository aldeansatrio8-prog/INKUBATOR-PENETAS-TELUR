<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS PRO — DATA LOGGING PERMANEN</title>
    <!-- Firebase SDK Legacy (Lebih Stabil untuk Dashboard Sederhana) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #22d3ee; --danger: #f43f5e; --success: #10b981; --bg: #020617; --card: #0f172a; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #1e293b; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .card { background: var(--card); border: 1px solid #1e293b; border-radius: 15px; padding: 20px; text-align: center; }
        .val { font-size: 2.5rem; font-weight: bold; color: var(--primary); }
        .log-controls { margin-top: 20px; background: #1e293b; padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; }
        button { padding: 12px 24px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-start { background: var(--success); color: white; }
        .btn-stop { background: var(--danger); color: white; }
        .status-badge { padding: 5px 10px; border-radius: 5px; font-size: 0.8rem; }
        .active { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .inactive { background: rgba(244, 63, 94, 0.2); color: var(--danger); }
        #chart-wrapper { background: var(--card); padding: 20px; border-radius: 15px; margin-top: 20px; height: 400px; border: 1px solid #1e293b; }
        .device-status { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; font-size: 0.9rem; }
        .st-item { padding: 8px; border-radius: 5px; background: #1e293b; border: 1px solid #334155; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h2 style="margin:0">NEXUS PRO V4.5</h2>
            <small id="last-seen">Sistem: Menghubungkan...</small>
        </div>
        <div id="clock" style="font-size: 1.2rem; font-weight: bold;">00:00:00</div>
    </div>

    <div class="grid">
        <div class="card">Suhu<div class="val" id="t">0.0</div></div>
        <div class="card">Lembap<div class="val" id="h">0.0</div></div>
        <div class="card">
            Status Alat
            <div class="device-status">
                <div class="st-item" id="st-l">Lampu: --</div>
                <div class="st-item" id="st-m">Mist: --</div>
                <div class="st-item" id="st-e">Exh: --</div>
                <div class="st-item" id="st-r">Motor: --</div>
            </div>
        </div>
    </div>

    <div class="log-controls">
        <div>
            <strong>Logging History:</strong> 
            <span id="log-indicator" class="status-badge inactive">Non-Aktif</span>
        </div>
        <div>
            <button class="btn-start" onclick="setLogging(true)">MULAI LOGGING</button>
            <button class="btn-stop" onclick="setLogging(false)">BERHENTI</button>
        </div>
    </div>

    <div id="chart-wrapper">
        <canvas id="historyChart"></canvas>
    </div>
</div>

<script>
    // KONFIGURASI FIREBASE (Gunakan URL DB Anda)
    const firebaseConfig = {
        databaseURL: "https://penetas-telur-553a3-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Inisialisasi Chart
    const ctx = document.getElementById('historyChart').getContext('2d');
    const historyChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [
                { label: 'Suhu (°C)', borderColor: '#22d3ee', data: [], tension: 0.3, yAxisID: 'y' },
                { label: 'Lembap (%)', borderColor: '#818cf8', data: [], tension: 0.3, yAxisID: 'y1' }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: { type: 'linear', display: true, position: 'left', grid: { color: '#1e293b' } },
                y1: { type: 'linear', display: true, position: 'right', grid: { drawOnChartArea: false } }
            },
            plugins: { legend: { labels: { color: 'white' } } }
        }
    });

    // 1. DATA LIVE (Status Alat & Angka)
    db.ref('inkubator/live').on('value', snap => {
        const d = snap.val();
        if(!d) return;

        document.getElementById('t').innerText = d.t.toFixed(1) + "°C";
        document.getElementById('h').innerText = d.h.toFixed(1) + "%";
        
        const updateUI = (id, label, state) => {
            const el = document.getElementById(id);
            el.innerText = `${label}: ${state ? 'ON' : 'OFF'}`;
            el.style.color = state ? '#4ade80' : '#f43f5e';
        };

        updateUI('st-l', 'Lampu', d.lampu);
        updateUI('st-m', 'Mist', d.mist);
        updateUI('st-e', 'Exh', d.exh);
        updateUI('st-r', 'Motor', d.motor);
        document.getElementById('last-seen').innerText = "Update: " + new Date().toLocaleTimeString();
    });

    // 2. DATA LOGGING PERMANEN (History)
    // Fungsi ini menarik data dari folder history. Data di sini TIDAK AKAN HILANG meski ESP restart.
    db.ref('inkubator/history').limitToLast(50).on('value', snap => {
        const labels = [];
        const tempLog = [];
        const humLog = [];

        snap.forEach(child => {
            const val = child.val();
            // Konversi Firebase Server Timestamp ke Jam Lokal
            const time = new Date(val.ts).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            labels.push(time);
            tempLog.push(val.t);
            humLog.push(val.h);
        });

        historyChart.data.labels = labels;
        historyChart.data.datasets[0].data = tempLog;
        historyChart.data.datasets[1].data = humLog;
        historyChart.update();
    });

    // 3. KONTROL LOGGING
    db.ref('inkubator/settings/loggingActive').on('value', snap => {
        const active = snap.val();
        const ind = document.getElementById('log-indicator');
        ind.innerText = active ? "AKTIF" : "NON-AKTIF";
        ind.className = active ? "status-badge active" : "status-badge inactive";
    });

    function setLogging(val) {
        db.ref('inkubator/settings').update({ loggingActive: val });
    }

    // Jam Digital
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID');
    }, 1000);
</script>

</body>
</html>
