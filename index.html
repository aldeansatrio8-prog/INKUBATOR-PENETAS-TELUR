<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Incubator Dashboard Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            color: var(--primary);
            margin: 0;
            font-size: 2.5rem;
        }

        .status-badges {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            border: 1px solid transparent;
        }

        .on { background: rgba(16, 185, 129, 0.2); color: var(--success); border-color: var(--success); }
        .off { background: rgba(239, 68, 68, 0.2); color: var(--danger); border-color: var(--danger); }

        .main-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .card .label { color: var(--text-dim); font-size: 14px; text-transform: uppercase; }
        .card .value { font-size: 36px; font-weight: bold; margin: 10px 0; }
        .card .unit { font-size: 18px; color: var(--text-dim); }

        .chart-container {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            height: 300px;
        }

        .relay-status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .relay-item {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .log-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #334155;
        }

        th { color: var(--text-dim); font-size: 13px; }

        .indicator-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
        .dot-on { background: var(--success); box-shadow: 0 0 8px var(--success); }
        .dot-off { background: var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>NEXUS DASHBOARD</h1>
        <div class="status-badges">
            <span id="sys-status" class="badge off">System Offline</span>
            <span id="sd-status" class="badge off">SD: Error</span>
        </div>
    </header>

    <div class="main-grid">
        <div class="card">
            <i class="fas fa-thermometer-half" style="color: #fb7185"></i>
            <div class="label">Suhu</div>
            <div class="value"><span id="val-t">--.-</span><span class="unit">°C</span></div>
        </div>
        <div class="card">
            <i class="fas fa-tint" style="color: #38bdf8"></i>
            <div class="label">Lembap</div>
            <div class="value"><span id="val-h">--</span><span class="unit">%</span></div>
        </div>
        <div class="card">
            <i class="fas fa-sun" style="color: #fbbf24"></i>
            <div class="label">Intensitas Cahaya</div>
            <div class="value"><span id="val-l">--</span><span class="unit">Lux</span></div>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="liveChart"></canvas>
    </div>

    <div class="relay-status-grid">
        <div class="relay-item">
            <span><i class="fas fa-lightbulb"></i> Lampu</span>
            <span id="st-lamp" class="badge off">OFF</span>
        </div>
        <div class="relay-item">
            <span><i class="fas fa-wind"></i> Exhaust</span>
            <span id="st-exh" class="badge off">OFF</span>
        </div>
        <div class="relay-item">
            <span><i class="fas fa-cloud-rain"></i> Mist Maker</span>
            <span id="st-mist" class="badge off">OFF</span>
        </div>
        <div class="relay-item">
            <span><i class="fas fa-sync"></i> Motor Rak</span>
            <span id="st-motor" class="badge off">OFF</span>
        </div>
    </div>

    <div class="log-section">
        <h3><i class="fas fa-history"></i> Log Data Terakhir</h3>
        <table>
            <thead>
                <tr>
                    <th>Waktu</th>
                    <th>Suhu</th>
                    <th>Humi</th>
                    <th>LDR</th>
                    <th>Status Motor</th>
                </tr>
            </thead>
            <tbody id="log-body">
                <!-- Data dari Firebase akan muncul di sini -->
            </tbody>
        </table>
    </div>
</div>

<script>
    // --- KONFIGURASI FIREBASE ---
    const firebaseConfig = {
        databaseURL: "https://penetas-telur-553a3-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- INISIALISASI GRAFIK ---
    const ctx = document.getElementById('liveChart').getContext('2d');
    const liveChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: 'Suhu (°C)',
                borderColor: '#fb7185',
                data: [],
                borderWidth: 2,
                fill: false,
                tension: 0.4
            }, {
                label: 'Lembap (%)',
                borderColor: '#38bdf8',
                data: [],
                borderWidth: 2,
                fill: false,
                tension: 0.4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: { ticks: { color: '#94a3b8' } },
                y: { ticks: { color: '#94a3b8' } }
            },
            plugins: {
                legend: { labels: { color: '#f8fafc' } }
            }
        }
    });

    // --- MENDENGARKAN DATA REAL-TIME ---
    db.ref('/inkubator/live').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            // Update Angka
            document.getElementById('val-t').innerText = data.t.toFixed(1);
            document.getElementById('val-h').innerText = data.h.toFixed(0);
            // Anggap LDR dikirim dari ESP32 dengan key 'ldr' (atau random mock jika belum ada)
            const ldrVal = data.ldr || Math.floor(Math.random() * 500); 
            document.getElementById('val-l').innerText = ldrVal;

            // Status Sistem & SD
            document.getElementById('sys-status').innerText = "System Online";
            document.getElementById('sys-status').className = "badge on";
            document.getElementById('sd-status').innerText = data.sd_st ? "SD: Ready" : "SD: Error";
            document.getElementById('sd-status').className = data.sd_st ? "badge on" : "badge off";

            // Status Indikator Relay
            updateStatus('st-lamp', data.l_st);
            updateStatus('st-exh', data.e_st);
            updateStatus('st-mist', data.m_st);
            updateStatus('st-motor', data.r_st);

            // Update Grafik
            const now = new Date().toLocaleTimeString('id-ID', { hour12: false });
            if (liveChart.data.labels.length > 10) {
                liveChart.data.labels.shift();
                liveChart.data.datasets[0].data.shift();
                liveChart.data.datasets[1].data.shift();
            }
            liveChart.data.labels.push(now);
            liveChart.data.datasets[0].data.push(data.t);
            liveChart.data.datasets[1].data.push(data.h);
            liveChart.chart.update();

            // Tambah ke Tabel Log (Hanya 5 terakhir)
            updateTable(now, data.t, data.h, ldrVal, data.r_st);
        }
    });

    function updateStatus(id, state) {
        const el = document.getElementById(id);
        if (state == 1 || state === true) {
            el.innerText = "ON";
            el.className = "badge on";
        } else {
            el.innerText = "OFF";
            el.className = "badge off";
        }
    }

    const logs = [];
    function updateTable(time, t, h, l, motor) {
        const tableBody = document.getElementById('log-body');
        const motorText = motor ? '<span class="dot-on indicator-dot"></span>Running' : '<span class="dot-off indicator-dot"></span>Stopped';
        
        logs.unshift({ time, t, h, l, motorText });
        if (logs.length > 5) logs.pop();

        tableBody.innerHTML = logs.map(log => `
            <tr>
                <td>${log.time}</td>
                <td>${log.t.toFixed(1)}°C</td>
                <td>${log.h.toFixed(0)}%</td>
                <td>${log.l} Lux</td>
                <td>${log.motorText}</td>
            </tr>
        `).join('');
    }
</script>

</body>
</html>
