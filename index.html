<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS ULTIMATE V6.5</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --success: #00ff88;
            --danger: #ff3e3e;
            --bg: #030712;
            --card: rgba(30, 41, 59, 0.6);
        }

        body {
            background-color: var(--bg);
            color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(112, 0, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(0, 242, 255, 0.1) 0%, transparent 40%);
            min-height: 100vh;
        }

        .glass {
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        .status-glow-on {
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.5);
            border-color: var(--primary);
            color: var(--primary);
        }

        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .spinning { animation: spin-slow 2s linear infinite; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-6xl mx-auto">
    <!-- Header -->
    <header class="glass p-6 mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-4">
            <div class="bg-cyan-500 p-3 rounded-2xl shadow-lg shadow-cyan-500/20">
                <i data-lucide="layout-dashboard" class="text-slate-900"></i>
            </div>
            <div>
                <h1 class="text-2xl font-extrabold tracking-tight text-white">NEXUS <span class="text-cyan-400">INCUBATOR</span></h1>
                <p class="text-slate-400 text-sm font-semibold uppercase tracking-widest">System Monitor V4.5</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <div id="connection-status" class="px-4 py-2 rounded-full glass text-xs flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-rose-500 animate-pulse"></div> Offline
            </div>
            <div id="day-counter" class="bg-indigo-600 px-6 py-2 rounded-full font-bold text-sm shadow-lg shadow-indigo-500/30">
                HARI KE: --
            </div>
        </div>
    </header>

    <!-- Main Stats -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="glass p-8 relative overflow-hidden">
            <p class="text-slate-400 text-xs font-bold uppercase mb-2 text-center">Suhu Internal</p>
            <div class="flex justify-center items-baseline gap-2">
                <span id="val-t" class="text-6xl font-extrabold">--.-</span>
                <span class="text-2xl text-slate-500 font-bold">°C</span>
            </div>
        </div>
        <div class="glass p-8 relative overflow-hidden">
            <p class="text-slate-400 text-xs font-bold uppercase mb-2 text-center">Kelembapan</p>
            <div class="flex justify-center items-baseline gap-2">
                <span id="val-h" class="text-6xl font-extrabold">--</span>
                <span class="text-2xl text-slate-500 font-bold">%</span>
            </div>
        </div>
        <div class="glass p-8 flex flex-col justify-center items-center text-center">
            <p class="text-slate-400 text-xs font-bold uppercase mb-2">Waktu & Penyimpanan</p>
            <h3 id="val-time" class="text-4xl font-extrabold text-cyan-400">--:--:--</h3>
            <div id="sd-status-container" class="mt-4 flex items-center gap-2 px-4 py-1.5 rounded-xl bg-slate-800/50 border border-white/5">
                <i data-lucide="hard-drive" size="14"></i>
                <span id="val-sd" class="text-[11px] font-black tracking-widest uppercase">Checking...</span>
            </div>
        </div>
    </div>

    <!-- Components Status -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
        <div id="card-lamp" class="glass p-6 text-center">
            <i data-lucide="flame" class="mx-auto mb-3"></i>
            <p class="text-[10px] font-bold text-slate-500 uppercase">Heater</p>
            <p id="txt-lamp" class="font-black text-lg">OFF</p>
        </div>
        <div id="card-mist" class="glass p-6 text-center">
            <i data-lucide="cloud-rain" class="mx-auto mb-3"></i>
            <p class="text-[10px] font-bold text-slate-500 uppercase">Mist Maker</p>
            <p id="txt-mist" class="font-black text-lg">OFF</p>
        </div>
        <div id="card-exh" class="glass p-6 text-center">
            <i data-lucide="fan" id="icon-exh" class="mx-auto mb-3"></i>
            <p class="text-[10px] font-bold text-slate-500 uppercase">Exhaust</p>
            <p id="txt-exh" class="font-black text-lg">OFF</p>
        </div>
        <div id="card-roll" class="glass p-6 text-center">
            <i data-lucide="refresh-cw" id="icon-roll" class="mx-auto mb-3"></i>
            <p class="text-[10px] font-bold text-slate-500 uppercase">Motor Roll</p>
            <p id="txt-roll" class="font-black text-lg">WAIT</p>
        </div>
    </div>

    <!-- Bottom Section: Chart & Table -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="glass p-6 lg:col-span-2">
            <h3 class="font-bold mb-4">Grafik Tren Sensor</h3>
            <div class="h-64"><canvas id="mainChart"></canvas></div>
        </div>
        
        <div class="glass p-6 overflow-hidden flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold">Riwayat Log</h3>
                <!-- TOMBOL DOWNLOAD CSV -->
                <button onclick="downloadCSV()" class="bg-cyan-500/10 hover:bg-cyan-500 text-cyan-400 hover:text-white p-2 rounded-lg transition-all flex items-center gap-2 text-[10px] font-bold border border-cyan-500/20">
                    <i data-lucide="download" size="14"></i> EXPORT CSV
                </button>
            </div>
            <div class="overflow-y-auto flex-grow pr-2 text-xs">
                <table class="w-full" id="historyTable">
                    <thead class="text-slate-500 text-left">
                        <tr><th class="pb-2">Waktu</th><th class="pb-2 text-center">T (°C)</th><th class="pb-2 text-center">H (%)</th></tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-white/5"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    lucide.createIcons();
    const firebaseConfig = { databaseURL: "https://penetas-telur-553a3-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let historyData = []; // Untuk menyimpan data yang akan di-export

    // Chart
    const ctx = document.getElementById('mainChart').getContext('2d');
    const mainChart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [
            { label: 'Suhu', borderColor: '#00f2ff', data: [], tension: 0.4, pointRadius: 2, backgroundColor: 'rgba(0,242,255,0.1)', fill: true },
            { label: 'Humi', borderColor: '#7000ff', data: [], tension: 0.4, pointRadius: 2 }
        ]},
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' } }, x: { grid: { display: false } } } }
    });

    // Monitor Data Live
    db.ref('inkubator/live').on('value', snap => {
        const d = snap.val();
        if(!d) return;

        document.getElementById('val-t').innerText = d.t.toFixed(1);
        document.getElementById('val-h').innerText = Math.round(d.h);
        document.getElementById('val-time').innerText = d.ts || "--:--:--";
        
        const sdTxt = document.getElementById('val-sd');
        const sdCont = document.getElementById('sd-status-container');
        if(d.sd_st) {
            sdTxt.innerText = "SD CARD: OK";
            sdTxt.className = "text-[11px] font-black tracking-widest uppercase text-emerald-400";
            sdCont.style.borderColor = "rgba(16, 185, 129, 0.3)";
        } else {
            sdTxt.innerText = "SD CARD: ERROR";
            sdTxt.className = "text-[11px] font-black tracking-widest uppercase text-rose-500";
            sdCont.style.borderColor = "rgba(244, 63, 94, 0.3)";
        }

        document.getElementById('connection-status').innerHTML = `<div class="w-2 h-2 rounded-full bg-emerald-500"></div> Online`;

        const updateComp = (id, st, iconId) => {
            const card = document.getElementById('card-'+id);
            const txt = document.getElementById('txt-'+id);
            if(st) { 
                card.classList.add('status-glow-on'); 
                txt.innerText = id==='roll'?'ROLLING':'ON';
                if(iconId) document.getElementById(iconId).classList.add('spinning');
            } else { 
                card.classList.remove('status-glow-on'); 
                txt.innerText = id==='roll'?'WAIT':'OFF';
                if(iconId) document.getElementById(iconId).classList.remove('spinning');
            }
        };
        updateComp('lamp', d.l_st);
        updateComp('mist', d.m_st);
        updateComp('exh', d.e_st, 'icon-exh');
        updateComp('roll', d.r_st, 'icon-roll');
    });

    // History & Export Logic
    db.ref('inkubator/history').limitToLast(50).on('value', snap => {
        let labels=[], temps=[], hums=[], rows="";
        historyData = []; 
        
        snap.forEach(c => { 
            const val = c.val();
            const date = new Date(val.ts);
            const timeStr = date.toLocaleString('id-ID');
            
            historyData.push({ waktu: timeStr, suhu: val.t, lembap: val.h });
            
            labels.push(date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}));
            temps.push(val.t); 
            hums.push(val.h);
        });
        
        mainChart.data.labels = labels;
        mainChart.data.datasets[0].data = temps;
        mainChart.data.datasets[1].data = hums;
        mainChart.update();

        [...historyData].reverse().forEach(v => {
            rows += `<tr><td class="py-2 text-slate-400">${v.waktu}</td><td class="text-center font-bold text-cyan-400">${v.suhu.toFixed(1)}</td><td class="text-center text-indigo-400">${Math.round(v.lembap)}</td></tr>`;
        });
        document.getElementById('table-body').innerHTML = rows;
    });

    // FUNGSI DOWNLOAD CSV
    function downloadCSV() {
        if(historyData.length === 0) return alert("Belum ada data untuk didownload");
        
        let csvContent = "data:text/csv;charset=utf-8,Waktu,Suhu (C),Kelembapan (%)\n";
        historyData.forEach(row => {
            csvContent += `${row.waktu},${row.suhu},${row.lembap}\n`;
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", "log_inkubator_" + new Date().getTime() + ".csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
</body>
</html>
