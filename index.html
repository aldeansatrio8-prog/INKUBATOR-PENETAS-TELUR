<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EGG INCUBATOR — NEXUS CONTROL</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  :root {
    --bg-root: #050a0e; --bg-panel: #0d1821; --cyan: #00f2ff; --red: #ff3131; --text: #e0e6ed;
  }
  body {
    background: var(--bg-root); color: var(--text); font-family: 'Rajdhani', sans-serif;
    margin: 0; padding: 20px; overflow-x: hidden;
  }
  .container { max-width: 1200px; margin: auto; }
  
  /* Header & Status */
  header { border-bottom: 2px solid var(--cyan); padding-bottom: 10px; margin-bottom: 25px; display: flex; justify-content: space-between; }
  .status-badge { padding: 5px 15px; border-radius: 20px; background: #1a2a3a; font-size: 0.8rem; border: 1px solid var(--cyan); }
  .online { box-shadow: 0 0 10px var(--cyan); color: var(--cyan); }

  /* Grid Layout */
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
  .card { background: var(--bg-panel); border: 1px solid #1a2a3a; border-radius: 12px; padding: 20px; text-align: center; position: relative; }
  .card h3 { font-size: 0.9rem; color: var(--cyan); margin: 0; text-transform: uppercase; letter-spacing: 2px; }
  .val { font-family: 'Share Tech Mono', monospace; font-size: 3.5rem; margin: 15px 0; color: #fff; }
  .unit { font-size: 1.2rem; color: var(--cyan); opacity: 0.7; }

  /* Chart & Table */
  .chart-box { background: var(--bg-panel); border-radius: 12px; padding: 20px; margin-top: 25px; height: 350px; }
  .table-box { width: 100%; margin-top: 25px; overflow-x: auto; border-radius: 12px; }
  table { width: 100%; border-collapse: collapse; background: var(--bg-panel); font-size: 0.9rem; }
  th, td { padding: 12px; text-align: left; border-bottom: 1px solid #1a2a3a; }
  th { color: var(--cyan); background: #162531; }

  /* Control Button */
  .btn {
    background: var(--cyan); color: var(--bg-root); border: none; padding: 12px 25px; 
    border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 20px;
  }
  .btn:hover { box-shadow: 0 0 15px var(--cyan); }
  .critical { border-color: var(--red) !important; animation: blink 1s infinite; }
  @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
</style>
</head>
<body>

<div class="container">
  <header>
    <div>
      <h1 style="margin:0; letter-spacing:4px;">NEXUS CONTROL V2.5</h1>
      <span style="color:#888;">INCUBATOR REMOTE MONITORING</span>
    </div>
    <div id="conn-stat" class="status-badge">CONNECTING TO CLOUD...</div>
  </header>

  <div class="grid">
    <div class="card" id="temp-card">
      <h3>Temperature</h3>
      <div class="val"><span id="t-val">0.0</span><span class="unit">°C</span></div>
      <div id="t-status">OPTIMAL</div>
    </div>
    <div class="card">
      <h3>Humidity</h3>
      <div class="val"><span id="h-val">0.0</span><span class="unit">%</span></div>
      <div id="h-status">STABLE</div>
    </div>
    <div class="card">
      <h3>Light / LDR</h3>
      <div class="val"><span id="l-val">0</span><span class="unit">lx</span></div>
      <div id="lamp-status">SENSOR OK</div>
    </div>
  </div>

  <div class="grid" style="margin-top:20px; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));">
    <div class="card" style="padding:10px;">
      <h3 style="font-size:0.7rem;">MOTOR STATUS</h3>
      <div id="m-stat" style="font-size:1.2rem; font-weight:bold; margin-top:5px;">OFF</div>
    </div>
    <div class="card" style="padding:10px;">
      <h3 style="font-size:0.7rem;">LAST SYNC</h3>
      <div id="w-val" style="font-size:1rem; margin-top:5px;">--:--:--</div>
    </div>
  </div>

  <div class="chart-box">
    <canvas id="liveChart"></canvas>
  </div>

  <div style="text-align:center;">
    <button class="btn" onclick="downloadCSV()">Download Logger (CSV)</button>
  </div>

  <div class="table-box">
    <table>
      <thead>
        <tr><th>TIMESTAMP</th><th>TEMP (°C)</th><th>HUMI (%)</th><th>LDR</th><th>MOTOR</th></tr>
      </thead>
      <tbody id="log-body"></tbody>
    </table>
  </div>
</div>

<script>
  // --- CONFIG SINKRON DENGAN ESP32 ---
  const firebaseConfig = {
    apiKey: "xCm0ksd61Ro6jIchxhiErcfGh9AtzCoCzjpcYvto",
    databaseURL: "https://inkubator--v1-default-rtdb.asia-southeast1.firebasedatabase.app"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // --- CHART SETUP ---
  const ctx = document.getElementById('liveChart').getContext('2d');
  const chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [{
        label: 'Temp realtime',
        data: [],
        borderColor: '#00f2ff',
        tension: 0.3,
        fill: true,
        backgroundColor: 'rgba(0, 242, 255, 0.05)'
      }]
    },
    options: { maintainAspectRatio: false, scales: { y: { grid: { color: '#1a2a3a' } }, x: { grid: { color: '#1a2a3a' } } } }
  });

  // --- REALTIME LISTENER ---
  db.ref('inkubator/live').on('value', (snap) => {
    const data = snap.val();
    if (data) {
      // Update Val
      document.getElementById('t-val').innerText = parseFloat(data.t || 0).toFixed(1);
      document.getElementById('h-val').innerText = parseFloat(data.h || 0).toFixed(1);
      document.getElementById('l-val').innerText = data.l || 0;
      document.getElementById('m-stat').innerText = (data.m == 1 || data.m == true) ? "RUNNING" : "IDLE";
      document.getElementById('m-stat').style.color = (data.m == 1) ? "var(--cyan)" : "#888";
      
      const now = new Date();
      const timeStr = now.getHours() + ":" + now.getMinutes() + ":" + now.getSeconds();
      document.getElementById('w-val').innerText = timeStr;

      // Alarm Suhu (37.5 - 38.5)
      const tCard = document.getElementById('temp-card');
      if (data.t > 38.5 || data.t < 36.0) {
        tCard.classList.add('critical');
        document.getElementById('t-status').innerText = "CRITICAL";
      } else {
        tCard.classList.remove('critical');
        document.getElementById('t-status').innerText = "OPTIMAL";
      }

      // Update Badge
      document.getElementById('conn-stat').innerText = "SYSTEM ONLINE";
      document.getElementById('conn-stat').classList.add('online');

      // Update Chart
      if (chart.data.labels.length > 20) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
      chart.data.labels.push(timeStr);
      chart.data.datasets[0].data.push(data.t);
      chart.update();

      // Update Table
      const row = `<tr><td>${timeStr}</td><td>${data.t}</td><td>${data.h}</td><td>${data.l}</td><td>${data.m ? 'ON':'OFF'}</td></tr>`;
      const tbody = document.getElementById('log-body');
      tbody.insertAdjacentHTML('afterbegin', row);
      if (tbody.rows.length > 10) tbody.deleteRow(10);
    }
  });

  function downloadCSV() {
    db.ref('inkubator/history').limitToLast(100).once('value', (snap) => {
      let csv = "Timestamp,Temp,Humi,LDR,Motor\n";
      snap.forEach(child => {
        const d = child.val();
        csv += `${d.w},${d.t},${d.h},${d.l},${d.m}\n`;
      });
      const blob = new Blob([csv], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `inkubator_log_${new Date().getTime()}.csv`;
      a.click();
    });
  }
</script>
</body>
</html>
