<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>NEXUS PRO V3.9 DASHBOARD</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --cyan: #22d3ee; --bg: #020617; --card: #0f172a; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .timer-box { background: linear-gradient(135deg, #6366f1, #a855f7); padding: 25px; border-radius: 20px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .card { background: var(--card); border: 1px solid #1e293b; border-radius: 15px; padding: 20px; }
        .val { font-size: 2.5rem; font-weight: bold; color: var(--cyan); }
        .history { background: var(--card); margin-top: 20px; padding: 20px; border-radius: 15px; text-align: left; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; border-bottom: 1px solid #1e293b; text-align: center; }
        button { background: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; margin: 5px; }
        .btn-csv { background: #22c55e; color: white; }
    </style>
</head>
<body>
    <h1>NEXUS INTELLIGENT SYSTEM</h1>
    <div class="timer-box">
        <div class="val" id="days" style="color:white">22</div>
        <div>HARI TERSIHA MENUJU PENETASAN</div>
        <button onclick="resetHatch()">RESET SIKLUS</button>
    </div>

    <div class="grid">
        <div class="card"><div>SUHU</div><div class="val" id="t">0.0</div></div>
        <div class="card"><div>LEMBAP</div><div class="val" id="h">0.0</div></div>
        <div class="card"><div>CAHAYA</div><div class="val" id="l">0</div></div>
    </div>

    <div class="history">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <h3>LOGGING DATA (HISTORY)</h3>
            <button class="btn-csv" onclick="downloadCSV()">DOWNLOAD EXCEL (CSV)</button>
        </div>
        <canvas id="myChart" style="height:200px; margin-bottom: 20px;"></canvas>
        <table>
            <thead><tr><th>Waktu</th><th>Suhu</th><th>Lembap</th><th>LDR</th></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <script>
        const config = { databaseURL: "https://penetas-telur-553a3-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(config);
        const db = firebase.database();
        let historyData = [];

        // Chart.js Init
        const ctx = document.getElementById('myChart').getContext('2d');
        const myChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{label:'Suhu', borderColor:'#22d3ee', data:[]}, {label:'Lembap', borderColor:'#4ade80', data:[]}] }
        });

        // 1. Live Data
        db.ref('inkubator/live').on('value', s => {
            const d = s.val();
            if(d) {
                document.getElementById('t').innerText = d.t.toFixed(1) + "°C";
                document.getElementById('h').innerText = d.h.toFixed(1) + "%";
                document.getElementById('l').innerText = d.l;
            }
        });

        // 2. History & Table
        db.ref('inkubator/history').limitToLast(50).on('value', s => {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = ""; historyData = [];
            myChart.data.labels = []; myChart.data.datasets[0].data = []; myChart.data.datasets[1].data = [];

            s.forEach(child => {
                const v = child.val();
                const time = new Date(v.ts).toLocaleTimeString('id-ID');
                historyData.push(v);
                
                tbody.insertAdjacentHTML('afterbegin', `<tr><td>${time}</td><td>${v.t}</td><td>${v.h}</td><td>${v.l}</td></tr>`);
                myChart.data.labels.push(time);
                myChart.data.datasets[0].data.push(v.t);
                myChart.data.datasets[1].data.push(v.h);
            });
            myChart.update();
        });

        function downloadCSV() {
            let csv = "Waktu,Suhu,Lembap,LDR\n";
            historyData.forEach(r => { csv += `${new Date(r.ts).toLocaleString()},${r.t},${r.h},${r.l}\n`; });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url); a.setAttribute('download', 'data_inkubator.csv');
            a.click();
        }

        function resetHatch() {
            if(confirm("Mulai siklus baru 22 hari?")) {
                localStorage.setItem('h_start', new Date().getTime());
                updateDays();
            }
        }

        function updateDays() {
            let start = localStorage.getItem('h_start') || new Date().getTime();
            if(!localStorage.getItem('h_start')) localStorage.setItem('h_start', start);
            let left = Math.max(22 - Math.floor((new Date().getTime() - start)/(1000*60*60*24)), 0);
            document.getElementById('days').innerText = left;
            db.ref('inkubator/settings').update({ daysLeft: left });
        }
        updateDays();
        setInterval(updateDays, 60000);
    </script>
</body>
</html>
