<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>NEXUS DASHBOARD V4.8</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #22d3ee; --bg: #020617; --card: #0f172a; --border: #1e293b; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        .header { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 20px; text-align: center; }
        .val { font-size: 2.5rem; font-weight: bold; color: var(--primary); margin: 10px 0; }
        #chart-box { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--border); height: 350px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 15px; overflow: hidden; }
        th, td { padding: 12px; border-bottom: 1px solid var(--border); text-align: center; }
        th { background: #1e293b; color: var(--primary); }
        .badge { padding: 5px 10px; border-radius: 5px; font-size: 0.8rem; font-weight: bold; }
        .on { background: rgba(34, 211, 238, 0.2); color: var(--primary); }
        .off { background: rgba(244, 63, 94, 0.2); color: #f43f5e; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div><h2 style="margin:0">NEXUS PRO MONITORING</h2><small id="status">Status: Connecting...</small></div>
        <div id="jam" style="font-size: 1.5rem; font-weight: bold; color: var(--primary);">00:00:00</div>
    </div>
    <div class="grid">
        <div class="card">Suhu (°C)<div class="val" id="t">0.0</div><span id="l-st" class="badge">LAMPU</span></div>
        <div class="card">Lembap (%)<div class="val" id="h">0.0</div><span id="m-st" class="badge">MIST</span></div>
        <div class="card">Cahaya<div class="val" id="ldr">0</div><span id="e-st" class="badge">EXHAUST</span></div>
        <div class="card">Motor<div id="r-val" style="font-size: 1.5rem; margin: 15px 0;">WAITING</div><span id="r-st" class="badge">MOTOR</span></div>
    </div>
    <div id="chart-box"><canvas id="myChart"></canvas></div>
    <table>
        <thead><tr><th>Waktu</th><th>Suhu</th><th>Lembap</th><th>Status</th></tr></thead>
        <tbody id="log-body"></tbody>
    </table>
</div>
<script>
    const firebaseConfig = { databaseURL: "https://penetas-telur-553a3-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const ctx = document.getElementById('myChart').getContext('2d');
    const myChart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [
            { label: 'Suhu', borderColor: '#22d3ee', data: [], tension: 0.3 },
            { label: 'Lembap', borderColor: '#818cf8', data: [], tension: 0.3 }
        ]},
        options: { responsive: true, maintainAspectRatio: false }
    });

    db.ref('inkubator/live').on('value', s => {
        const d = s.val(); if(!d) return;
        document.getElementById('t').innerText = d.t.toFixed(1);
        document.getElementById('h').innerText = d.h.toFixed(1);
        document.getElementById('ldr').innerText = d.ldr;
        document.getElementById('r-val').innerText = d.r_st ? "RUNNING" : "WAITING";
        const setB = (id, st) => { document.getElementById(id).className = st ? "badge on" : "badge off"; };
        setB('l-st', d.l_st); setB('m_st', d.m_st); setB('e_st', d.e_st); setB('r_st', d.r_st);
        document.getElementById('status').innerText = "Last Update: " + d.time;
    });

    db.ref('inkubator/history').limitToLast(10).on('value', s => {
        const table = document.getElementById('log-body'); table.innerHTML = "";
        const times = [], temps = [], hums = [];
        s.forEach(child => {
            const v = child.val(); const time = new Date(v.ts).toLocaleTimeString();
            times.push(time); temps.push(v.t); hums.push(v.h);
            table.insertAdjacentHTML('afterbegin', `<tr><td>${time}</td><td>${v.t.toFixed(1)}°C</td><td>${v.h.toFixed(1)}%</td><td>RECORDED</td></tr>`);
        });
        myChart.data.labels = times; myChart.data.datasets[0].data = temps; myChart.data.datasets[1].data = hums; myChart.update();
    });
    setInterval(() => { document.getElementById('jam').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
