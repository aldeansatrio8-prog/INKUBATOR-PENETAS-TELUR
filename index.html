<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Inkubator Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --bg: #0f172a; --primary: #38bdf8; --card: rgba(30, 41, 59, 0.8); --text: #f1f5f9; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .value { font-size: 3rem; font-weight: bold; color: var(--primary); }
        .btn-download { background: #22c55e; color: white; padding: 12px 20px; text-decoration: none; border-radius: 8px; display: inline-block; margin: 10px 0; font-weight: bold; }
        iframe { width: 100%; height: 500px; border-radius: 10px; background: white; margin-top: 15px; }
        canvas { max-height: 250px; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="font-family: 'Orbitron'; text-align: center; color: var(--primary);">SMART INCUBATOR MONITOR</h1>
    
    <div class="grid">
        <div class="card">
            <h3>🌡️ Suhu & Kelembapan</h3>
            <div>Suhu: <span id="val-temp" class="value">--</span> °C</div>
            <div>Lembap: <span id="val-humi" class="value" style="color:#fbbf24">--</span> %</div>
        </div>

        <div class="card" style="grid-column: span 2;">
            <h3>📈 Grafik Suhu Real-Time</h3>
            <canvas id="realtimeChart"></canvas>
        </div>
    </div>

    <div class="card" style="margin-top:20px;">
        <h3>📊 Riwayat Data (Google Sheets)</h3>
        
        <a id="downloadBtn" href="#" class="btn-download">📥 Download Data Excel (.xlsx)</a>
        
        <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vRl2kPMxGhIdPFxaPBzKgwgOIXrkVuTA2bmJ2Vr7WDOTdQvU2jfmVxXkP3x3KaOIsg1ySC652J0AuR_/pubhtml?widget=true&amp;headers=false"></iframe>
    </div>
</div>

    firebase.initializeApp(config);

    document.getElementById('downloadBtn').href = `https://docs.google.com/spreadsheets/d/${sheetID}/export?format=xlsx`;

    });
