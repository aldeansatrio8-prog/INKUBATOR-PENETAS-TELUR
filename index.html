<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inkubator Pro | Dashboard Futuristik</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --accent: #fbbf24;
            --bg: #050b18;
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(58, 123, 213, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 210, 255, 0.15) 0%, transparent 40%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--glass);
            padding-bottom: 20px;
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            background: var(--glass);
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .pulse {
            display: inline-block;
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #ff4b2b;
            margin-right: 8px;
        }
        .online .pulse { background: #00ff88; box-shadow: 0 0 10px #00ff88; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass);
            border-radius: 24px;
            padding: 30px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .card:hover { transform: translateY(-5px); }

        .card::before {
            content: '';
            position: absolute; top: 0; left: 0; width: 4px; height: 100%;
            background: var(--primary);
        }

        .card.humi::before { background: var(--accent); }

        .label {
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #94a3b8;
            font-weight: 600;
        }

        .main-val {
            font-size: 5rem;
            font-weight: 700;
            margin: 10px 0;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            align-items: baseline;
        }

        .main-val span { font-size: 1.5rem; color: #64748b; margin-left: 10px; }

        .desc { color: #64748b; font-size: 1rem; }

        .card-wide { grid-column: span 2; }
        @media (max-width: 900px) { .card-wide { grid-column: span 1; } }

        canvas { width: 100% !important; height: 250px !important; }

        .actions {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn-excel {
            padding: 15px 35px;
            border-radius: 12px;
            background: linear-gradient(45deg, #1d976c, #93f9b9);
            color: #050b18;
            text-decoration: none;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(29, 151, 108, 0.3);
            transition: 0.3s;
        }

        .btn-excel:hover { transform: scale(1.05); }

        footer { text-align: center; margin-top: 50px; color: #475569; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>INKUBATOR PRO V2</h1>
        <div id="status-container" class="status-badge">
            <span class="pulse"></span> <span id="status-text">Mencari Sinyal ESP32...</span>
        </div>
    </header>

    <div class="grid">
        <div class="card temp">
            <div class="label">Suhu Internal</div>
            <div class="main-val"><span id="t-val">--.-</span><span>°C</span></div>
            <div class="desc" id="t-status">Status: Membaca...</div>
        </div>

        <div class="card humi">
            <div class="label">Kelembapan</div>
            <div class="main-val" style="color: var(--accent);"><span id="h-val">--.-</span><span>%</span></div>
            <div class="desc" id="h-status">Status: Membaca...</div>
        </div>

        <div class="card card-wide">
            <div class="label">Analisis Data Real-Time</div>
            <div style="margin-top: 20px;">
                <canvas id="iotChart"></canvas>
            </div>
        </div>
    </div>

    <div class="actions">
        <a id="downloadExcel" href="#" class="btn-excel">📊 Download Excel (XLSX)</a>
    </div>

    <footer>&copy; 2026 Smart Farm Systems | Monitoring Telur Otomatis</footer>
</div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        databaseURL: "https://penetas-telur-21ecc-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Link Excel
    const sID = "1vRl2kPMxGhIdPFxaPBzKgwgOIXrkVuTA2bmJ2Vr7WDOTdQvU2jfmVxXkP3x3KaOIsg1ySC652J0AuR_";
    document.getElementById('downloadExcel').href = `https://docs.google.com/spreadsheets/d/${sID}/export?format=xlsx`;

    // --- CHART CONFIG ---
    const ctx = document.getElementById('iotChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: 'Suhu (°C)',
                data: [],
                borderColor: '#00d2ff',
                backgroundColor: 'rgba(0, 210, 255, 0.1)',
                borderWidth: 3, tension: 0.4, fill: true, pointRadius: 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                x: { display: false },
                y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } }
            }
        }
    });

    // --- LISTENERS ---
    db.ref("Inkubator/suhu").on("value", (snap) => {
        const v = snap.val();
        if(v) {
            document.getElementById('t-val').innerText = v.toFixed(1);
            document.getElementById('status-container').className = "status-badge online";
            document.getElementById('status-text').innerText = "Sistem Online";
            
            const time = new Date().toLocaleTimeString();
            chart.data.labels.push(time);
            chart.data.datasets[0].data.push(v);
            if(chart.data.labels.length > 20) {
                chart.data.labels.shift();
                chart.data.datasets[0].data.shift();
            }
            chart.update();
        }
    });

    db.ref("Inkubator/kelembapan").on("value", (snap) => {
        const v = snap.val();
        if(v) document.getElementById('h-val').innerText = v.toFixed(1);
    });
</script>
</body>
</html>
